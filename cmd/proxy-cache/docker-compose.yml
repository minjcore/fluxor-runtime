version: '3.8'

services:
  proxycache:
    build:
      context: ../..
      dockerfile: cmd/proxycache/Dockerfile
    container_name: proxycache
    ports:
      - "8080:8080"
    environment:
      - CACHE_TYPE=memory
      - VERBOSE=true
    volumes:
      - cache_data:/cache
      - ./config.json:/app/config.json:ro
    restart: unless-stopped
    networks:
      - proxycache-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/_health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  proxycache-redis:
    build:
      context: ../..
      dockerfile: cmd/proxycache/Dockerfile
    container_name: proxycache-redis
    ports:
      - "8081:8080"
    environment:
      - CACHE_TYPE=redis
      - REDIS_ADDR=redis:6379
      - VERBOSE=true
    command: ["./proxycache", "-cache", "/cache", "-port", "8080", "-cache-type", "redis", "-redis", "redis:6379"]
    depends_on:
      - redis
    volumes:
      - cache_data_redis:/cache
    restart: unless-stopped
    networks:
      - proxycache-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/_health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: proxycache-redis-db
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    networks:
      - proxycache-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: proxycache-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    networks:
      - proxycache-network

  grafana:
    image: grafana/grafana:latest
    container_name: proxycache-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - proxycache-network

volumes:
  cache_data:
    driver: local
  cache_data_redis:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  proxycache-network:
    driver: bridge
